<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
</head>

<body>

<header>
    <img src="logo.png" alt="Logo de la empresa">

    <nav>
        <a href="#">Inicio</a>
        <a href="#">Contacto</a>
        <a href="#">Servicios</a>
        <a href="#">Blog</a>
    </nav>
</header>

<main>

    <h1>Contáctanos</h1>
    <p>Dejanos tu mensaje</p>

    <form action="/enviar" method="POST">

        <!-- Datos personales -->
        <fieldset>
            <legend>Datos personales</legend>

            <label for="nombre">Nombre *</label>
            <input type="text" id="nombre" name="nombre" required aria-required="true">

            <label for="email">Email *</label>
            <input 
                type="email" 
                id="email" 
                name="email" 
                required 
                aria-required="true"
                placeholder="ejemplo@correo.com"
                pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
            >

            <label for="telefono">Teléfono</label>
            <input 
                type="tel" 
                id="telefono" 
                name="telefono"
                pattern="[0-9+]{7,15}"
            >
        </fieldset>

        <!-- Consulta -->
        <fieldset>
            <legend>Tipo de consulta</legend>

            <label for="motivo">Motivo *</label>
            <select id="motivo" name="motivo" required aria-required="true">
                <option value="">Seleccioná...</option>
                <option value="consulta">Consulta</option>
                <option value="sugerencia">Sugerencia</option>
                <option value="reclamo">Reclamo</option>
            </select>
        </fieldset>

        <!-- Mensaje -->
        <fieldset>
            <legend>Mensaje</legend>

            <label for="mensaje">Mensaje *</label>
            <textarea id="mensaje" name="mensaje" required aria-required="true"></textarea>
        </fieldset>

        <!-- Checkbox -->
        <label>
            <input type="checkbox" required>
            Acepto los términos *
        </label>

        <!-- Radio buttons -->
        <fieldset>
            <legend>Tipo de contacto</legend>

            <label>
                <input type="radio" name="tipo" value="consulta" required>
                Consulta
            </label>

            <label>
                <input type="radio" name="tipo" value="sugerencia">
                Sugerencia
            </label>
        </fieldset>

        <!-- Submit -->
        <button type="submit">Enviar</button>

    </form>

</main>

<footer>
    <p>© 2026 - Todos los derechos reservados</p>
</footer>

</body>
</html>
